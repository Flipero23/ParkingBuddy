name: parking_buddy
description: "ParkingBuddy - Smart parking app for Skopje"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2
  google_fonts: ^6.2.1
  http: ^1.3.0
  permission_handler: ^11.4.0
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
